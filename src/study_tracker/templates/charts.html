{% extends "base.html" %}

{% block content %}
  <section class="page-heading">
    <h1>Charts</h1>
    <p>Charts are regenerated from the SQLite database whenever this page loads.</p>
  </section>

  {% for chart in charts %}
    <section class="panel">
      <h2>{{ chart.title }}</h2>
      <p>{{ chart.description }}</p>
      <img class="chart" src="{{ url_for('static', filename='charts/' ~ chart.filename) }}" alt="{{ chart.title }}">
    </section>
  {% endfor %}
{% endblock %}
